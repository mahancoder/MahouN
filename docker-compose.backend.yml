# ============================================================================
# MAHOUN Backend - Production Docker Compose (Backend-Only)
# ============================================================================
# Focus: Zero-Hallucination AI Reasoning Platform
# Core Value: Graph-based reasoning engine with 100% groundedness guarantee
# ============================================================================

version: '3.9'

x-backend-env: &backend-env
  # Application
  MAHOUN_ENV: production
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  TZ: UTC
  
  # Core Architecture
  MAHOUN_GUARD_MODE: "STRICT"
  DETERMINISTIC_ID_ONLY: "true"
  MAHOUN_ALLOW_EXPERIMENTAL: "false"
  STOCHASTIC_THRESHOLD: "0.0"
  
  # Workers & Performance
  UNIFIED_LOADER_WORKERS: ${UNIFIED_LOADER_WORKERS:-4}
  JOB_POLLING_INTERVAL: ${JOB_POLLING_INTERVAL:-2}
  DLQ_MAX_RETRIES: ${DLQ_MAX_RETRIES:-3}
  MEMORY_SAFEGUARD_GB: ${MEMORY_SAFEGUARD_GB:-2.0}
  
  # Neo4j - Graph Database (CRITICAL for zero-hallucination)
  NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${DB_NEO4J_PASSWORD:?DB_NEO4J_PASSWORD required}
  DB_NEO4J_PASSWORD: ${DB_NEO4J_PASSWORD:?DB_NEO4J_PASSWORD required}
  DB_NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
  DB_NEO4J_USER: ${NEO4J_USER:-neo4j}
  ENABLE_NEO4J: "true"
  
  # PostgreSQL - Metadata & Audit Trail
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-mahoun}
  POSTGRES_USER: ${POSTGRES_USER:-mahoun}
  POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD required}
  DB_POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD required}
  DB_POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  DB_POSTGRES_PORT: 5432
  DB_POSTGRES_DB: ${POSTGRES_DB:-mahoun}
  DB_POSTGRES_USER: ${POSTGRES_USER:-mahoun}
  ENABLE_POSTGRES: "true"
  
  # Redis - Cache & Distributed Locks
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
  DB_REDIS_HOST: redis
  DB_REDIS_PORT: 6379
  DB_REDIS_DB: 0
  ENABLE_REDIS: "true"
  
  # ChromaDB - Vector Store for RAG
  CHROMA_HOST: ${CHROMA_HOST:-chromadb}
  CHROMA_PORT: 8000
  CHROMA_TOKEN: ${CHROMA_TOKEN:-}
  
  # Security
  JWT_SECRET_KEY: ${SECURITY_JWT_SECRET:?SECURITY_JWT_SECRET required}
  SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:?SECURITY_JWT_SECRET required}
  API_KEY: ${API_KEY:?API_KEY required}
  
  # Monitoring
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: 9090

services:
  # ==========================================================================
  # Backend - MAHOUN Zero-Hallucination AI Reasoning Engine
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
      args:
        BUILD_ENV: production
        PYTHON_VERSION: 3.12.7
      cache_from:
        - mahoun/backend:latest
    image: mahoun/backend:${VERSION:-latest}
    container_name: mahoun_access_tier
    restart: unless-stopped
    
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    
    environment:
      <<: *backend-env
    
    volumes:
      # Persistent data (CRITICAL for zero-hallucination guarantee)
      - backend_data:/app/data
      - backend_dlq:/app/data/dlq  # Dead Letter Queue for failed jobs
      - backend_uploads:/app/uploads
      - backend_vector_store:/app/vector_store_data
      - backend_output:/app/output
      - backend_runtime:/app/runtime
      - backend_logs:/app/logs
      
      # Immutable Ledger (audit trail)
      - backend_ledger:/app/ledger
      
      # Proof Pack (verification artifacts)
      - ./proof_pack:/app/proof_pack:ro
    
    networks:
      - mahoun_access_tier
      - mahoun_secure_tier
      - mahoun-monitoring
    
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "python3 /app/infrastructure/health/integrity_probe.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 4G
          # ==================================================================
          # SERVER DEPLOYMENT: Uncomment the block below to enable GPU support
          # ==================================================================
          # devices:
          #   - driver: nvidia
          #     count: all
          #     capabilities: [gpu]
          # ==================================================================
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "10"
        labels: "service,environment,version"
        tag: "mahoun_access_tier"
    
    labels:
      - "com.mahoun.service=backend"
      - "com.mahoun.component=reasoning-engine"
      - "com.mahoun.environment=production"
      - "com.mahoun.version=${VERSION:-latest}"
      - "com.mahoun.architecture=zero-hallucination"

  # ==========================================================================
  # Neo4j - Graph Database (CRITICAL for Evidence-Linked Reasoning)
  # ==========================================================================
  neo4j:
    image: neo4j:5.27.0-community
    container_name: mahoun-neo4j
    restart: unless-stopped
    
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "2004:2004"  # Prometheus metrics
    
    environment:
      # Authentication
      NEO4J_AUTH: ${DB_NEO4J_USER:-neo4j}/${DB_NEO4J_PASSWORD:?DB_NEO4J_PASSWORD required}
      
      # Plugins (CRITICAL for graph algorithms)
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      
      # Memory Configuration (optimized for reasoning)
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-4G}
      NEO4J_dbms_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-2G}
      NEO4J_dbms_memory_transaction_max__size: 1G
      
      # Security
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      
      # Network
      NEO4J_dbms_default__listen__address: 0.0.0.0
      NEO4J_dbms_connector_bolt_listen__address: :7687
      NEO4J_dbms_connector_http_listen__address: :7474
      
      # Performance Tuning
      NEO4J_dbms_query_cache__size: 1000
      NEO4J_dbms_tx__log_rotation_retention__policy: "7 days"
      NEO4J_dbms_checkpoint_interval_time: 15m
      
      # Monitoring
      NEO4J_server_metrics_enabled: "true"
      NEO4J_server_metrics_prometheus_enabled: "true"
      NEO4J_server_metrics_prometheus_endpoint: 0.0.0.0:2004
      
      # Logging
      NEO4J_dbms_logs_query_enabled: "INFO"
      NEO4J_dbms_logs_query_threshold: 5s
    
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
      - neo4j_metrics:/var/lib/neo4j/metrics
    
    networks:
      - mahoun_secure_tier
      - mahoun-monitoring
    
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 90s
    
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 8G
    
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "10"
    
    labels:
      - "com.mahoun.service=neo4j"
      - "com.mahoun.component=graph-database"
      - "com.mahoun.critical=true"
      - "com.mahoun.environment=production"

  # ==========================================================================
  # PostgreSQL - Relational Database (Metadata & Audit Trail)
  # ==========================================================================
  postgres:
    image: postgres:16.6-alpine
    container_name: mahoun-postgres
    restart: unless-stopped
    
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    
    environment:
      # Database
      POSTGRES_DB: ${POSTGRES_DB:-mahoun}
      POSTGRES_USER: ${POSTGRES_USER:-mahoun}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD required}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
      PGDATA: /var/lib/postgresql/data/pgdata
      
      # Performance Tuning (optimized for audit trail writes)
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-512MB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${POSTGRES_EFFECTIVE_CACHE_SIZE:-2GB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 16MB
      POSTGRES_DEFAULT_STATISTICS_TARGET: 100
      POSTGRES_RANDOM_PAGE_COST: 1.1
      POSTGRES_EFFECTIVE_IO_CONCURRENCY: 200
      POSTGRES_WORK_MEM: 8MB
      POSTGRES_MIN_WAL_SIZE: 2GB
      POSTGRES_MAX_WAL_SIZE: 8GB
      POSTGRES_MAX_WORKER_PROCESSES: 8
      POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER: 4
      POSTGRES_MAX_PARALLEL_WORKERS: 8
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./mahoun/graph/schema/sql/master_schema.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    
    networks:
      - mahoun_secure_tier
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mahoun} -d ${POSTGRES_DB:-mahoun}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
    
    labels:
      - "com.mahoun.service=postgres"
      - "com.mahoun.component=relational-database"
      - "com.mahoun.environment=production"

  # ==========================================================================
  # Redis - Cache & Distributed Locks
  # ==========================================================================
  redis:
    image: redis:7.4.2-alpine
    container_name: mahoun-redis
    restart: unless-stopped
    
    ports:
      - "${REDIS_PORT:-6379}:6379"
    
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD required}"
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAX_MEMORY:-4gb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --loglevel notice
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
    
    volumes:
      - redis_data:/data
    
    networks:
      - mahoun_secure_tier
      - mahoun-monitoring
    
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    
    labels:
      - "com.mahoun.service=redis"
      - "com.mahoun.component=cache"
      - "com.mahoun.environment=production"

  # ==========================================================================
  # ChromaDB - Vector Database (for RAG)
  # ==========================================================================
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: mahoun-chromadb
    restart: unless-stopped
    
    ports:
      - "${CHROMADB_PORT:-8001}:8000"
    
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ${CHROMA_AUTH_PROVIDER:-chromadb.auth.token.TokenAuthCredentialsProvider}
      CHROMA_SERVER_AUTH_CREDENTIALS: ${CHROMA_TOKEN:-}
      CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER: X-Chroma-Token
    
    volumes:
      - chromadb_data:/chroma/chroma
    
    networks:
      - mahoun_secure_tier
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
    
    labels:
      - "com.mahoun.service=chromadb"
      - "com.mahoun.component=vector-database"
      - "com.mahoun.environment=production"

  # ==========================================================================
  # Prometheus - Metrics Collection (Optional)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: mahoun-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    
    networks:
      - mahoun-monitoring
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"
    
    labels:
      - "com.mahoun.service=prometheus"
      - "com.mahoun.component=monitoring"
      - "com.mahoun.environment=production"

# ============================================================================
# Named Volumes (Persistent Data)
# ============================================================================
volumes:
  # Backend (CRITICAL - Zero-Hallucination Data)
  backend_data:
    driver: local
    name: mahoun_backend_data
    labels:
      - "com.mahoun.backup=daily"
      - "com.mahoun.critical=true"
  
  backend_dlq:
    driver: local
    name: mahoun_backend_dlq
    labels:
      - "com.mahoun.backup=daily"
  
  backend_uploads:
    driver: local
    name: mahoun_backend_uploads
    labels:
      - "com.mahoun.backup=daily"
  
  backend_vector_store:
    driver: local
    name: mahoun_backend_vector_store
    labels:
      - "com.mahoun.backup=weekly"
  
  backend_output:
    driver: local
    name: mahoun_backend_output
  
  backend_runtime:
    driver: local
    name: mahoun_backend_runtime
  
  backend_logs:
    driver: local
    name: mahoun_backend_logs
    labels:
      - "com.mahoun.retention=30d"
  
  backend_ledger:
    driver: local
    name: mahoun_backend_ledger
    labels:
      - "com.mahoun.backup=hourly"
      - "com.mahoun.critical=true"
      - "com.mahoun.immutable=true"
  
  # Neo4j (CRITICAL - Graph Database)
  neo4j_data:
    driver: local
    name: mahoun_neo4j_data
    labels:
      - "com.mahoun.backup=hourly"
      - "com.mahoun.critical=true"
  
  neo4j_logs:
    driver: local
    name: mahoun_neo4j_logs
    labels:
      - "com.mahoun.retention=30d"
  
  neo4j_import:
    driver: local
    name: mahoun_neo4j_import
  
  neo4j_plugins:
    driver: local
    name: mahoun_neo4j_plugins
  
  neo4j_metrics:
    driver: local
    name: mahoun_neo4j_metrics
  
  # PostgreSQL (Audit Trail)
  postgres_data:
    driver: local
    name: mahoun_postgres_data
    labels:
      - "com.mahoun.backup=daily"
      - "com.mahoun.critical=true"
  
  postgres_backups:
    driver: local
    name: mahoun_postgres_backups
  
  # Redis (Cache)
  redis_data:
    driver: local
    name: mahoun_redis_data
    labels:
      - "com.mahoun.backup=daily"
  
  # ChromaDB (Vector Store)
  chromadb_data:
    driver: local
    name: mahoun_chromadb_data
    labels:
      - "com.mahoun.backup=weekly"
  
  # Monitoring
  prometheus_data:
    driver: local
    name: mahoun_prometheus_data
    labels:
      - "com.mahoun.retention=90d"

# ============================================================================
# Networks (Isolated & Secure)
# ============================================================================
networks:
  mahoun_access_tier:
    external: true
    name: mahoun_access_tier
  
  mahoun_secure_tier:
    external: true
    name: mahoun_secure_tier
  
  mahoun-monitoring:
    external: true
    name: mahoun_monitoring_prod
