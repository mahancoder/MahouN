# ============================================================================
# MAHOUN Platform - Testing Docker Compose
# ============================================================================
# Purpose: Run automated tests in isolated Docker environment
# Usage:
#   docker-compose -f docker-compose.test.yml up --build --abort-on-container-exit
#   docker-compose -f docker-compose.test.yml run --rm test-runner pytest tests/ -v
# ============================================================================

services:
  # ==========================================================================
  # Test Runner - Isolated Testing Environment
  # ==========================================================================
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: testing
      args:
        BUILD_ENV: testing
        PYTHON_VERSION: 3.12.7
    image: mahoun/test-runner:latest
    container_name: mahoun-test-runner
    environment:
      # Test environment
      - MAHOUN_ENV=test
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app

      # Disable external services for unit tests
      - ENABLE_NEO4J=false
      - ENABLE_POSTGRES=false
      - ENABLE_REDIS=false

      # Test-specific settings
      - MAHOUN_GUARD_MODE=STRICT
      - DETERMINISTIC_ID_ONLY=true
      - MAHOUN_ALLOW_EXPERIMENTAL=false

    volumes:
      # Mount source code for live testing
      - ./mahoun:/app/mahoun:ro
      - ./api:/app/api:ro
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      
      # Test output
      - ./test-results:/app/test-results
      - ./htmlcov:/app/htmlcov

    working_dir: /app

    # Default: Run all tests
    command: >
      pytest tests/
      --verbose
      --tb=short
      --cov=mahoun
      --cov-report=html:/app/htmlcov
      --cov-report=term-missing
      --junit-xml=/app/test-results/junit.xml
      -m "not slow and not integration"

    networks:
      - test_network

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================================================
  # Symbolic Reasoning Tests - Focused Test Suite
  # ==========================================================================
  test-symbolic:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: testing
      args:
        BUILD_ENV: testing
    image: mahoun/test-runner:latest
    container_name: mahoun-test-symbolic
    environment:
      - MAHOUN_ENV=test
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app

    volumes:
      - ./mahoun:/app/mahoun:ro
      - ./tests:/app/tests:ro
      - ./test-results:/app/test-results

    working_dir: /app

    command: >
      pytest tests/test_symbolic_reasoning*.py
      --verbose
      --tb=short
      --junit-xml=/app/test-results/symbolic-junit.xml

    networks:
      - test_network

  # ==========================================================================
  # Graph-to-FOL Tests - Focused Test Suite
  # ==========================================================================
  test-graph-to-fol:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: testing
    image: mahoun/test-runner:latest
    container_name: mahoun-test-graph-to-fol
    environment:
      - MAHOUN_ENV=test
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app

    volumes:
      - ./mahoun:/app/mahoun:ro
      - ./tests:/app/tests:ro
      - ./test-results:/app/test-results

    working_dir: /app

    command: >
      pytest tests/test_graph_to_fol*.py
      --verbose
      --tb=short
      --junit-xml=/app/test-results/graph-to-fol-junit.xml

    networks:
      - test_network

  # ==========================================================================
  # Integration Tests - With Full Stack
  # ==========================================================================
  test-integration:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: testing
    image: mahoun/test-runner:latest
    container_name: mahoun-test-integration
    environment:
      - MAHOUN_ENV=test
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app

      # Enable services for integration tests
      - ENABLE_NEO4J=true
      - ENABLE_POSTGRES=true
      - ENABLE_REDIS=true

      # Service connections
      - NEO4J_URI=bolt://neo4j-test:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=test_password_change_me

      - POSTGRES_HOST=postgres-test
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mahoun_test
      - POSTGRES_USER=mahoun_test
      - POSTGRES_PASSWORD=test_password_change_me

      - REDIS_URL=redis://redis-test:6379/0

    volumes:
      - ./mahoun:/app/mahoun:ro
      - ./api:/app/api:ro
      - ./tests:/app/tests:ro
      - ./test-results:/app/test-results

    working_dir: /app

    command: >
      pytest tests/
      --verbose
      --tb=short
      -m "integration"
      --junit-xml=/app/test-results/integration-junit.xml

    depends_on:
      neo4j-test:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy

    networks:
      - test_network

  # ==========================================================================
  # Test Dependencies - Neo4j
  # ==========================================================================
  neo4j-test:
    image: neo4j:5-community
    container_name: mahoun-neo4j-test
    environment:
      - NEO4J_AUTH=neo4j/test_password_change_me
      - NEO4J_dbms_memory_heap_max__size=256M
      - NEO4J_dbms_memory_pagecache_size=128M

    networks:
      - test_network

    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    tmpfs:
      - /data

  # ==========================================================================
  # Test Dependencies - PostgreSQL
  # ==========================================================================
  postgres-test:
    image: postgres:16.6-alpine
    container_name: mahoun-postgres-test
    environment:
      - POSTGRES_DB=mahoun_test
      - POSTGRES_USER=mahoun_test
      - POSTGRES_PASSWORD=test_password_change_me

    networks:
      - test_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahoun_test -d mahoun_test"]
      interval: 5s
      timeout: 3s
      retries: 5

    tmpfs:
      - /var/lib/postgresql/data

  # ==========================================================================
  # Test Dependencies - Redis
  # ==========================================================================
  redis-test:
    image: redis:7.4.2-alpine
    container_name: mahoun-redis-test
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

    networks:
      - test_network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# ============================================================================
# Networks
# ============================================================================
networks:
  test_network:
    driver: bridge
    name: mahoun_test_network

# ============================================================================
# Usage Examples
# ============================================================================
# Run all unit tests:
#   docker-compose -f docker-compose.test.yml run --rm test-runner
#
# Run symbolic reasoning tests only:
#   docker-compose -f docker-compose.test.yml run --rm test-symbolic
#
# Run graph-to-fol tests only:
#   docker-compose -f docker-compose.test.yml run --rm test-graph-to-fol
#
# Run integration tests (with full stack):
#   docker-compose -f docker-compose.test.yml up --abort-on-container-exit test-integration
#
# Run specific test file:
#   docker-compose -f docker-compose.test.yml run --rm test-runner pytest tests/test_symbolic_reasoning.py -v
#
# Run with coverage:
#   docker-compose -f docker-compose.test.yml run --rm test-runner pytest tests/ --cov=mahoun --cov-report=html
#
# Interactive shell for debugging:
#   docker-compose -f docker-compose.test.yml run --rm test-runner bash
