# Docker Compose for Verification Tests
# =======================================
# Full-stack integration testing with real dependencies
# 
# Usage:
#   docker-compose -f docker-compose.verification.yml up --build --abort-on-container-exit
#
# This runs verification tests with:
# - Real Neo4j database
# - Real PostgreSQL database
# - Real Redis cache
# - Real ChromaDB vector store
# - Full MAHOUN platform

version: '3.8'

services:
  # ============================================================================
  # Infrastructure Services
  # ============================================================================
  
  neo4j:
    image: neo4j:5.15-community
    environment:
      - NEO4J_AUTH=neo4j/testpassword123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "testpassword123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
  
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=mahoun
      - POSTGRES_PASSWORD=testpassword123
      - POSTGRES_DB=mahoun_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahoun"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
  
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - chroma_data:/chroma/chroma
  
  # ============================================================================
  # Test Runners
  # ============================================================================
  
  verification-tests:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        - PYTHON_VERSION=3.12
    environment:
      # Test mode
      - MAHOUN_ENV=test
      - MAHOUN_MODE=enterprise_full
      - MAHOUN_DETERMINISTIC_TESTING=true
      
      # Database connections
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=testpassword123
      - POSTGRES_URI=postgresql://mahoun:testpassword123@postgres:5432/mahoun_test
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      
      # Logging
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      
      # Guardrails
      - MAHOUN_GUARD_MODE=STRICT
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    command: >
      bash -c "
        echo '🚀 Starting Verification Tests with Full Stack'
        echo '================================================'
        echo ''
        echo '📊 Infrastructure Status:'
        echo '  ✓ Neo4j:     bolt://neo4j:7687'
        echo '  ✓ PostgreSQL: postgresql://postgres:5432'
        echo '  ✓ Redis:      redis://redis:6379'
        echo '  ✓ ChromaDB:   http://chroma:8000'
        echo ''
        echo '🧪 Running Verification Tests...'
        echo ''
        
        # Seed test data
        python -c 'from tests.fixtures.seed_data import seed_test_knowledge_graph; seed_test_knowledge_graph()'
        
        # Run verification tests
        pytest tests/verification/ -v --tb=short --durations=10 \
          --junitxml=/tmp/test-results/verification.xml \
          --cov=mahoun \
          --cov-report=html:/tmp/coverage \
          --cov-report=term
        
        TEST_EXIT_CODE=\$?
        
        echo ''
        echo '================================================'
        if [ \$TEST_EXIT_CODE -eq 0 ]; then
          echo '✅ All Verification Tests PASSED'
        else
          echo '❌ Some Verification Tests FAILED'
        fi
        echo '================================================'
        
        exit \$TEST_EXIT_CODE
      "
    volumes:
      - ./tests:/app/tests
      - ./mahoun:/app/mahoun
      - test_results:/tmp/test-results
      - coverage_reports:/tmp/coverage
  
  # ============================================================================
  # Super Extreme Tests (High Resource)
  # ============================================================================
  
  super-extreme-tests:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - MAHOUN_ENV=test
      - MAHOUN_MODE=enterprise_full
      - MAHOUN_DETERMINISTIC_TESTING=true
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=testpassword123
      - POSTGRES_URI=postgresql://mahoun:testpassword123@postgres:5432/mahoun_test
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - LOG_LEVEL=WARNING  # Reduce noise for high-concurrency tests
      - MAHOUN_GUARD_MODE=STRICT
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    command: >
      bash -c "
        echo '🔥 Starting SUPER EXTREME Tests'
        echo '================================'
        echo ''
        echo '⚠️  WARNING: High resource usage ahead!'
        echo '   - 100+ concurrent tasks'
        echo '   - Adversarial attacks'
        echo '   - Chaos testing'
        echo ''
        
        pytest tests/verification/test_category_4_super_extreme.py -v -s \
          --tb=short \
          --junitxml=/tmp/test-results/super-extreme.xml
        
        TEST_EXIT_CODE=\$?
        
        echo ''
        echo '================================'
        if [ \$TEST_EXIT_CODE -eq 0 ]; then
          echo '✅ SUPER EXTREME Tests PASSED'
          echo '   System maintained integrity under extreme pressure!'
        else
          echo '❌ SUPER EXTREME Tests FAILED'
        fi
        echo '================================'
        
        exit \$TEST_EXIT_CODE
      "
    volumes:
      - ./tests:/app/tests
      - ./mahoun:/app/mahoun
      - test_results:/tmp/test-results
    # Resource limits for super extreme tests
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  chroma_data:
  test_results:
  coverage_reports:

networks:
  default:
    name: mahoun_verification_network
