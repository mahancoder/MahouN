name: MAHOUN Heavy Lock CI

on:
  push:
    branches: [ main, develop, linking ]
  pull_request:
    branches: [ main, develop, linking ]
  workflow_dispatch:

jobs:
  first-step-gates:
    name: First Step Gates (0-8)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better blame
      
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pydantic numpy
          pip install ruff basedpyright mypy
          pip install -r requirements.txt
      
      - name: 🔍 Gate 0.5: Import Regression Check
        id: gate0_5
        run: |
          echo "🔍 Checking for import regressions..."
          pytest --collect-only -q || {
            echo "❌ Import regression detected!"
            echo "Some modules failed to import during test collection."
            echo "This usually indicates:"
            echo "  - Missing dependencies"
            echo "  - Circular imports"
            echo "  - Syntax errors in test files"
            exit 1
          }
          echo "✅ All imports successful"
      
      - name: 🔒 Gate 0: Repo Integrity
        id: gate0
        run: |
          chmod +x ci/first_step/gate_0_integrity.sh
          ./ci/first_step/gate_0_integrity.sh
      
      - name: 🎨 Gate 1: Format/Lint
        id: gate1
        run: |
          chmod +x ci/first_step/gate_1_lint.sh
          ./ci/first_step/gate_1_lint.sh
      
      - name: 🔒 Gate 2: Type Safety
        id: gate2
        run: |
          chmod +x ci/first_step/gate_2_types.sh
          ./ci/first_step/gate_2_types.sh
      
      - name: 🧪 Gate 3: Phase-1 Reality Tests
        id: gate3
        run: |
          chmod +x ci/first_step/gate_3_reality.sh
          ./ci/first_step/gate_3_reality.sh
      
      - name: 🔍 Gate 4: Anti-Mock Proof
        id: gate4
        run: |
          chmod +x ci/first_step/gate_4_antimock.sh
          ./ci/first_step/gate_4_antimock.sh
      
      - name: 🎲 Gate 5: Determinism Proof
        id: gate5
        run: |
          chmod +x ci/first_step/gate_5_determinism.sh
          ./ci/first_step/gate_5_determinism.sh
      
      - name: 📦 Gate 6: Artifact + Traceability
        id: gate6
        if: always()  # Always generate artifacts
        run: |
          chmod +x ci/first_step/gate_6_artifacts.sh
          ./ci/first_step/gate_6_artifacts.sh
      
      - name: 🏗️ Gate 7: Architecture Boundaries
        id: gate7
        run: |
          chmod +x ci/first_step/gate_7_architecture.sh
          ./ci/first_step/gate_7_architecture.sh
      
      - name: 📜 Gate 8: Contract Validation
        id: gate8
        run: |
          chmod +x ci/first_step/gate_8_contracts.sh
          ./ci/first_step/gate_8_contracts.sh
      
      - name: 📤 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.sha }}
          path: /tmp/ci_artifacts/
          retention-days: 30
      
      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: /tmp/gate3_junit.xml
          retention-days: 30
      
      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🔒 MAHOUN Heavy Lock CI Results\n\n';
            
            const gates = [
              { num: 0, name: 'Repo Integrity', id: 'gate0' },
              { num: 1, name: 'Format/Lint', id: 'gate1' },
              { num: 2, name: 'Type Safety', id: 'gate2' },
              { num: 3, name: 'Phase-1 Reality Tests', id: 'gate3' },
              { num: 4, name: 'Anti-Mock Proof', id: 'gate4' },
              { num: 5, name: 'Determinism Proof', id: 'gate5' },
              { num: 6, name: 'Artifact + Traceability', id: 'gate6' },
              { num: 7, name: 'Architecture Boundaries', id: 'gate7' },
              { num: 8, name: 'Contract Validation', id: 'gate8' },
            ];
            
            summary += '| Gate | Name | Status |\n';
            summary += '|------|------|--------|\n';
            
            for (const gate of gates) {
              const outcome = '${{ steps[gate.id].outcome }}' || 'skipped';
              const icon = outcome === 'success' ? '✅' : 
                           outcome === 'failure' ? '❌' : '⏭️';
              summary += `| ${gate.num} | ${gate.name} | ${icon} ${outcome} |\n`;
            }
            
            summary += '\n**Commit:** `${{ github.sha }}`\n';
            summary += '**Python:** ${{ matrix.python-version }}\n\n';
            
            if ('${{ steps.gate0.outcome }}' === 'success' &&
                '${{ steps.gate1.outcome }}' === 'success' &&
                '${{ steps.gate2.outcome }}' === 'success' &&
                '${{ steps.gate3.outcome }}' === 'success' &&
                '${{ steps.gate4.outcome }}' === 'success' &&
                '${{ steps.gate5.outcome }}' === 'success' &&
                '${{ steps.gate7.outcome }}' === 'success' &&
                '${{ steps.gate8.outcome }}' === 'success') {
              summary += '### ✅ All gates passed - Ready to merge!\n';
            } else {
              summary += '### ❌ Some gates failed - Fix before merging\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # Optional: Integration tests (only on manual trigger or nightly)
  integration-tests:
    name: Integration Tests (Phase-2)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 🐳 Start services
        run: |
          docker-compose -f docker-compose.test.yml up -d
          sleep 10
      
      - name: 🧪 Run integration tests
        run: |
          pip install -r requirements-full.txt
          pytest tests/ -m integration -v
      
      - name: 🛑 Stop services
        if: always()
        run: docker-compose -f docker-compose.test.yml down






