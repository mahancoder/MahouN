# Pre-commit hooks for MAHOUN Platform
# Install: pip install pre-commit && pre-commit install

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # Ruff (format + lint)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --select, "E,F,I,UP,N,W"]
      - id: ruff-format

  # Type checking (fast mode)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        args: [--config-file=mypy.ini, --no-error-summary]
        additional_dependencies: [pydantic, numpy]
        files: ^(mahoun|output|api)/

  # Custom: Gate 0 subset (secrets check only)
  - repo: local
    hooks:
      - id: check-secrets
        name: Check for secrets
        entry: bash -c 'grep -r -E "(AKIA[0-9A-Z]{16}|password\s*=\s*['\''\""][^'\''\"]{8,})" --include="*.py" mahoun/ output/ api/ && exit 1 || exit 0'
        language: system
        pass_filenames: false
      
      - id: check-placeholders
        name: Check for placeholder patterns
        entry: bash -c 'grep -r "raise NotImplementedError" --include="*.py" mahoun/ output/ | grep -v "_impl" | grep -v "ABC" && exit 1 || exit 0'
        language: system
        pass_filenames: false






