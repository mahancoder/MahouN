# ============================================================================
# MAHOUN Platform - Development Docker Compose
# ============================================================================
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#   docker-compose -f docker-compose.dev.yml up --build
# ============================================================================
# Features:
#   - Hot-reload for backend and frontend
#   - Debug ports exposed
#   - Volume mounts for live code editing
#   - Relaxed resource limits
# ============================================================================

version: '3.9'

services:
  # ==========================================================================
  # Backend - FastAPI with Hot-Reload
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
      args:
        BUILD_ENV: dev
    image: mahoun/backend:dev
    container_name: mahoun-backend-dev
    restart: unless-stopped
    
    ports:
      - "8000:8000"
      - "5678:5678"  # debugpy port
    
    environment:
      # Application
      MAHOUN_ENV: dev
      LOG_LEVEL: DEBUG
      LOG_FORMAT: pretty
      
      # Development flags
      ENABLE_HOT_RELOAD: "true"
      ENABLE_DEBUG: "true"
      
      # Database (optional in dev)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${DB_NEO4J_PASSWORD:-dev_neo4j_password}
      ENABLE_NEO4J: ${ENABLE_NEO4J:-false}
      
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mahoun_dev
      POSTGRES_USER: mahoun
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-dev_postgres_password}
      ENABLE_POSTGRES: ${ENABLE_POSTGRES:-false}
      
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ""
      ENABLE_REDIS: ${ENABLE_REDIS:-false}
      
      # Security (relaxed for dev)
      JWT_SECRET_KEY: ${SECURITY_JWT_SECRET:-dev_jwt_secret_change_in_production}
      API_KEY: ${API_KEY:-dev_api_key}
      
      # Workers (minimal for dev)
      UNIFIED_LOADER_WORKERS: 1
      JOB_POLLING_INTERVAL: 5
      MEMORY_SAFEGUARD_GB: 1.0
    
    volumes:
      # Live code editing
      - ./api:/app/api:ro
      - ./mahoun:/app/mahoun:ro
      - ./config:/app/config:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      
      # Persistent data
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./vector_store_data:/app/vector_store_data
      - ./output:/app/output
      - ./runtime:/app/runtime
    
    networks:
      - mahoun-dev
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    # Relaxed limits for development
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # ==========================================================================
  # Frontend - React with Hot-Reload
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
    image: mahoun/frontend:dev
    container_name: mahoun-frontend-dev
    restart: unless-stopped
    
    ports:
      - "5173:5173"  # Vite dev server
    
    environment:
      VITE_API_URL: http://localhost:8000
      NODE_ENV: development
    
    volumes:
      # Live code editing
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/package.json:/app/package.json:ro
      
      # Node modules (don't override)
      - frontend_node_modules:/app/node_modules
    
    depends_on:
      - backend
    
    networks:
      - mahoun-dev
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ==========================================================================
  # Neo4j - Optional for Development
  # ==========================================================================
  neo4j:
    image: neo4j:5.27.0-community
    container_name: mahoun-neo4j-dev
    restart: unless-stopped
    profiles:
      - database
    
    ports:
      - "7474:7474"
      - "7687:7687"
    
    environment:
      NEO4J_AUTH: neo4j/${DB_NEO4J_PASSWORD:-dev_neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_memory_pagecache_size: 256M
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    
    volumes:
      - neo4j_dev_data:/data
    
    networks:
      - mahoun-dev
    
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # PostgreSQL - Optional for Development
  # ==========================================================================
  postgres:
    image: postgres:16.6-alpine
    container_name: mahoun-postgres-dev
    restart: unless-stopped
    profiles:
      - database
    
    ports:
      - "5432:5432"
    
    environment:
      POSTGRES_DB: mahoun_dev
      POSTGRES_USER: mahoun
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-dev_postgres_password}
    
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    
    networks:
      - mahoun-dev
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahoun -d mahoun_dev"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # Redis - Optional for Development
  # ==========================================================================
  redis:
    image: redis:7.4.2-alpine
    container_name: mahoun-redis-dev
    restart: unless-stopped
    profiles:
      - database
    
    ports:
      - "6379:6379"
    
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    
    volumes:
      - redis_dev_data:/data
    
    networks:
      - mahoun-dev
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  frontend_node_modules:
    name: mahoun_frontend_node_modules_dev
  neo4j_dev_data:
    name: mahoun_neo4j_dev_data
  postgres_dev_data:
    name: mahoun_postgres_dev_data
  redis_dev_data:
    name: mahoun_redis_dev_data

networks:
  mahoun-dev:
    driver: bridge
    name: mahoun_dev_network
