# Dependency Injection Rules
# ===========================
# When a core module needs functionality from a non-core module:
# 1. Define a Protocol in mahoun/core/protocols.py
# 2. Accept the protocol as an optional constructor parameter
# 3. Non-core module implements the protocol
# 4. Inject at runtime (not import time)

dependency_injection_examples:
  - protocol: "MetricsCollector"
    core_module: "reasoning"
    non_core_implementation: "metrics"
    usage: "Optional metrics collection without hard dependency"
  
  - protocol: "TracingProvider"
    core_module: "graph"
    non_core_implementation: "tracing"
    usage: "Optional distributed tracing without hard dependency"


# Protocol-Based Architecture
# ==================================
# Updated in v1.2.0 with ContradictionDetectorProtocol

protocol_definitions:
  location: "mahoun/core/protocols.py"
  purpose: "Define abstract interfaces for cross-boundary communication"
  protocols:
    - name: "QueryRouterProtocol"
      methods:
        - "route(query: str) -> RoutedQueryResult"
        - "classify(query: str) -> ClassificationResult"
        - "get_stats() -> Dict[str, Any]"
      implemented_by: "Non-core query routing implementations"
    
    - name: "ModelDriverProtocol"
      methods:
        - "model_name() -> str"
        - "generate(prompt: str, **kwargs) -> str"
        - "is_loaded() -> bool"
      implemented_by: "Non-core LLM driver implementations"
    
    - name: "ModelOrchestratorProtocol"
      methods:
        - "get_driver(model_name: str) -> ModelDriverProtocol"
      implemented_by: "Non-core model orchestrator implementations"
    
    - name: "ReasoningEngineProtocol"
      methods:
        - "process_query(query: str, context: Dict) -> Dict[str, Any]"
      implemented_by: "Core reasoning engine implementations"
    
    - name: "ContradictionDetectorProtocol"  # NEW in v1.2.0
      methods:
        - "detect_contradiction(statement1: str, statement2: str) -> Tuple[bool, float]"
        - "batch_detect(statements: List[Tuple[str, str]]) -> List[Tuple[bool, float]]"
      implemented_by: "mahoun.guardrails.ultra_nli_verifier.ContradictionDetector"
      accessed_via: "mahoun.reasoning.guardrails_adapter.create_contradiction_detector()"
      purpose: "Enable contradiction detection without core → guardrails dependency"

dependency_injection_container:
  location: "mahoun/reasoning/adapters.py"
  purpose: "Provide factory functions for creating reasoning components with injected dependencies"
  factory_functions:
    - name: "create_reasoning_engine"
      signature: "create_reasoning_engine(query_router: Optional[QueryRouterProtocol] = None, model_orchestrator: Optional[ModelOrchestratorProtocol] = None) -> ReasoningEngineProtocol"
      description: "Creates reasoning engine with optional dependencies injected"
    
    - name: "create_query_router"
      signature: "create_query_router() -> QueryRouterProtocol"
      description: "Creates default query router implementation"
    
    - name: "create_model_orchestrator"
      signature: "create_model_orchestrator() -> ModelOrchestratorProtocol"
      description: "Creates default model orchestrator implementation"

runtime_adapters:  # NEW in v1.2.0
  purpose: "Provide runtime access to non-core functionality without compile-time dependencies"
  adapters:
    - name: "guardrails_adapter"
      location: "mahoun/reasoning/guardrails_adapter.py"
      provides:
        - "create_contradiction_detector() -> Optional[ContradictionDetectorProtocol]"
      accesses: "mahoun.guardrails.ultra_nli_verifier"
      pattern: "Runtime import with graceful degradation"
      
    - name: "rag_adapter"
      location: "mahoun/reasoning/rag_adapter.py"
      provides:
        - "create_query_router(rag_service: Optional[RAGServiceProtocol]) -> Optional[QueryRouterProtocol]"
        - "create_rag_service() -> Optional[RAGServiceProtocol]"
        - "create_unified_reasoning_engine(router: QueryRouterProtocol) -> Optional[ReasoningEngineProtocol]"
        - "validate_rag_availability() -> bool"
        - "get_rag_adapter_info() -> dict"
      accesses: "mahoun.rag.*"
      pattern: "Enterprise-grade adapter with health checks and diagnostics"
      features:
        - "Thread-safe factory functions"
        - "Graceful degradation"
        - "Health check utilities"
        - "Diagnostic information"
      
    - name: "monitoring_adapter"
      location: "mahoun/reasoning/monitoring_adapter.py"
      provides:
        - "get_legal_query_decorator() -> Callable"
        - "track_legal_query_decorator"  # Pre-initialized decorator
      accesses: "mahoun.monitoring.legal_metrics"
      pattern: "Decorator pattern with null object fallback"
      features:
        - "Zero overhead when monitoring unavailable"
        - "No-op decorator fallback"
        - "Pre-initialized for performance"

usage_example: |
  # Without dependency injection (core only):
  from mahoun.reasoning import EvidenceLinkedVerdictEngine
  engine = EvidenceLinkedVerdictEngine()
  
  # With dependency injection (core + non-core):
  from mahoun.reasoning.adapters import create_reasoning_engine, create_query_router
  from mahoun.core.llm.orchestrator import ModelOrchestrator
  
  router = create_query_router()
  orchestrator = ModelOrchestrator()
  engine = create_reasoning_engine(query_router=router, model_orchestrator=orchestrator)

benefits:
  - "Core modules remain pure - no imports from non-core"
  - "Non-core functionality is optional and pluggable"
  - "Easy to test core modules in isolation"
  - "Clear separation of concerns"
  - "Follows SOLID principles (Dependency Inversion)"

architecture_pattern: "Orchestrator Pattern with Protocol-Based Dependency Injection"
