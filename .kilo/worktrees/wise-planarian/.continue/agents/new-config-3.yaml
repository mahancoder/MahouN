name: MiniMax M2.7 Config
version: 1.0.0
schema: v1

models:
  - name: MiniMax M2.7
    provider: openai
    model: minimaxai/minimax-m2.7
    apiBase: https://integrate.api.nvidia.com/v1
    apiKey: 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
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.6
      maxTokens: 8192
      topP: 0.95
    requestOptions:
      timeout: 300

rules:
  - You are an agentic coding assistant for team environments.
  - Focus on production-level code and debugging.
  - Always respond in Persian/Farsi.

context:
  - provider: code
  - provider: diff
  - provider: problems
  
  
