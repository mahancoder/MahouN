name: Nemotron 3 Super Config
version: 1.0.0
schema: v1

models:
  - name: Nemotron 3 Super
    provider: openai
    model: nvidia/nemotron-3-super-120b-a12b
    apiBase: https://integrate.api.nvidia.com/v1
    apiKey: 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
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.6
      maxTokens: 8192
      topP: 0.95
    requestOptions:
      timeout: 300

rules:
  - You are an expert software engineer specialized in large codebases.
  - You have 1M token context window - use it wisely.
  - Always respond in Persian/Farsi.

context:
  - provider: code
  - provider: diff
  - provider: terminal
