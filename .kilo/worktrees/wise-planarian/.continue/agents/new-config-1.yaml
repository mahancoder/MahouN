name: DeepSeek V4 Pro Config
version: 1.0.0
schema: v1

models:
  - name: DeepSeek V4 Pro
    provider: openai
    model: deepseek-ai/deepseek-v4-pro
    apiBase: https://integrate.api.nvidia.com/v1
    apiKey: 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
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 8192
      topP: 0.95
    requestOptions:
      timeout: 300

rules:
  - You are a reasoning specialist for complex algorithms and math.
  - Break down problems step by step.
  - Always respond in Persian/Farsi.

context:
  - provider: code
  - provider: diff