name: Enterprise Hardening Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  enterprise-hardening:
    name: Enterprise Hardening Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: 🔐 Test Security Module
        run: |
          pytest tests/test_enterprise_hardening_comprehensive.py::TestSecurityModule -v
      
      - name: 🔒 Test Concurrency Module
        run: |
          pytest tests/test_enterprise_hardening_comprehensive.py::TestConcurrencyModule -v
      
      - name: 📊 Test Monitoring Module
        run: |
          pytest tests/test_enterprise_hardening_comprehensive.py::TestMonitoringModule -v
      
      - name: 🔄 Test Execution Module
        run: |
          pytest tests/test_enterprise_hardening_comprehensive.py::TestExecutionModule -v
      
      - name: 📈 Test Graph Enhancements
        run: |
          pytest tests/test_concurrent_graph_comprehensive.py -v
          pytest tests/test_semantic_search_comprehensive.py -v
          pytest tests/test_vector_index_comprehensive.py -v
      
      - name: 📝 Test Async Ledger
        run: |
          pytest tests/test_async_ledger_comprehensive.py -v
      
      - name: 📊 Generate Coverage Report
        run: |
          pytest tests/test_enterprise_hardening_comprehensive.py \
            tests/test_concurrent_graph_comprehensive.py \
            tests/test_semantic_search_comprehensive.py \
            tests/test_vector_index_comprehensive.py \
            tests/test_async_ledger_comprehensive.py \
            --cov=mahoun --cov-report=html --cov-report=term
      
      - name: 📤 Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: htmlcov/
          retention-days: 30
      
      - name: 📊 Coverage Summary
        run: |
          echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          coverage report >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  llm-migration-tests:
    name: LLM Module Migration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: 🧪 Test LLM Router
        run: |
          pytest tests/test_llm_router_simple.py -v
          pytest tests/test_llm_router_properties.py -v
          pytest tests/test_llm_router_properties_complete.py -v
      
      - name: 🧪 Test Local LLM Driver
        run: |
          pytest tests/test_local_llm_driver.py -v
      
      - name: ✅ Verify No Core/LLM Dependencies
        run: |
          echo "Checking for old mahoun.core.llm imports..."
          if grep -r "from mahoun.core.llm" mahoun/ --exclude-dir=archive; then
            echo "❌ Found old mahoun.core.llm imports!"
            exit 1
          fi
          echo "✅ No old imports found"

  ocr-pipeline-tests:
    name: OCR Pipeline Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: 🧪 Test OCR Post Processor
        run: |
          pytest tests/test_ocr_post_processor.py -v
      
      - name: 🧪 Test OCR Pipeline Integration
        run: |
          pytest tests/test_ocr_pipeline_integration.py -v

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: 🔍 Type check
        working-directory: frontend
        run: npm run type-check
      
      - name: 🏗️ Build
        working-directory: frontend
        run: npm run build
      
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  docker-build-test:
    name: Docker Build & Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🏗️ Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: mahoun-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 🏗️ Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: mahoun-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 🧪 Run smoke tests
        run: |
          docker compose up -d
          sleep 30
          
          echo "Testing backend health..."
          curl -f http://localhost:8000/system/health || exit 1
          
          echo "Testing frontend..."
          curl -f http://localhost/ || exit 1
          
          echo "✅ Smoke tests passed"
          
          docker compose down

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [enterprise-hardening, llm-migration-tests, ocr-pipeline-tests, frontend-build, docker-build-test]
    if: always()
    
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🎯 Enterprise Hardening Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Enterprise Hardening | ${{ needs.enterprise-hardening.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LLM Migration | ${{ needs.llm-migration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OCR Pipeline | ${{ needs.ocr-pipeline-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build-test.result }} |" >> $GITHUB_STEP_SUMMARY
