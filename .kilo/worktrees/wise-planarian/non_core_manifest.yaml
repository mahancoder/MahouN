# Module Type Definitions
# ========================
module_types:
  adapter:
    description: "Integrates external systems or protocols"
    allowed_to_import_core: true
    allowed_to_import_non_core: true
    examples: ["mcp", "rag", "retrieval", "domain"]
  
  runtime:
    description: "Provides operational infrastructure"
    allowed_to_import_core: true
    allowed_to_import_non_core: true
    examples: ["orchestrator", "pipelines", "agents", "metrics", "tracing"]
  
  experimental:
    description: "Features under development or evaluation"
    allowed_to_import_core: true
    allowed_to_import_non_core: true
    feature_flags_required: true
    examples: ["finetuning", "self_improve", "flows", "profiler"]
  
  ui:
    description: "User interface and presentation layer"
    allowed_to_import_core: true
    allowed_to_import_non_core: true
    examples: ["dashboard", "guardrails", "uncertainty"]

# Stability Levels
# ================
stability_levels:
  stable:
    description: "Production-ready, backward compatible"
    breaking_changes_allowed: false
  
  experimental:
    description: "Under development, may change"
    breaking_changes_allowed: true
    requires_feature_flag: true
  
  deprecated:
    description: "Scheduled for removal"
    breaking_changes_allowed: true
    removal_timeline: "Next major version"


