<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f9fafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0" />
    </radialGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Glow effect -->
  <circle cx="120" cy="90" r="65" fill="url(#glowGrad)"/>
  
  <!-- Main M frame - Left -->
  <path d="M 30 30 L 50 30 L 50 150 L 30 150 Z" fill="url(#metalGrad)" filter="url(#shadow)"/>
  
  <!-- Main M frame - Right -->
  <path d="M 190 30 L 210 30 L 210 150 L 190 150 Z" fill="url(#metalGrad)" filter="url(#shadow)"/>
  
  <!-- Globe background -->
  <circle cx="120" cy="90" r="50" fill="url(#globeGrad)" opacity="0.95" filter="url(#shadow)"/>
  
  <!-- Globe grid lines -->
  <circle cx="120" cy="90" r="50" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>
  <ellipse cx="120" cy="90" rx="50" ry="25" fill="none" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>
  <ellipse cx="120" cy="90" rx="50" ry="15" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.2"/>
  <line x1="70" y1="90" x2="170" y2="90" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="40" x2="120" y2="140" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>
  
  <!-- M letter in Persian -->
  <text x="120" y="110" 
        font-family="'Vazirmatn', Arial, sans-serif" 
        font-size="75" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle"
        filter="url(#shadow)"
        style="text-shadow: 2px 2px 8px rgba(0,0,0,0.5)">م</text>
  
  <!-- Small globe icon -->
  <circle cx="180" cy="140" r="20" fill="#1e3a8a" opacity="0.9" filter="url(#shadow)"/>
  <circle cx="180" cy="140" r="20" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="140" x2="200" y2="140" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="120" x2="180" y2="160" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <ellipse cx="180" cy="140" rx="20" ry="10" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  
  <!-- Mahoon text -->
  <text x="120" y="215" 
        font-family="'Vazirmatn', Arial, sans-serif" 
        font-size="48" 
        font-weight="600" 
        fill="url(#metalGrad)" 
        text-anchor="middle"
        filter="url(#shadow)">ماحون</text>
  
  <!-- Subtitle -->
  <text x="120" y="245" 
        font-family="'Vazirmatn', Arial, sans-serif" 
        font-size="14" 
        font-weight="400" 
        fill="#9ca3af" 
        text-anchor="middle"
        opacity="0.8">سامانه حقوقی هوشمند</text>
</svg>
