name: Security Scanning

on:
  push:
    branches: [ main, develop, linking ]
  pull_request:
    branches: [ main, develop, linking ]
  schedule:
    # Run weekly on Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit
      
      - name: 🔍 Run Safety check
        run: |
          echo "Running Safety vulnerability scan..."
          safety check --json
          echo "✅ No critical vulnerabilities found by Safety"
      
      - name: 🔍 Run pip-audit
        run: |
          echo "Running pip-audit vulnerability scan..."
          pip-audit --desc
          echo "✅ No vulnerabilities found by pip-audit"
      
      - name: 📊 Generate report
        run: |
          echo "## 🔒 Dependency Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed at: $(date)" >> $GITHUB_STEP_SUMMARY

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔍 Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install Bandit
        run: |
          pip install bandit[toml]
      
      - name: 🔍 Run Bandit
        run: |
          echo "Running Bandit security scan..."
          bandit -r mahoun/ api/ -f json -o bandit-report.json
          bandit -r mahoun/ api/ -f txt
          echo "✅ No security issues found by Bandit"
      
      - name: 📤 Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-${{ github.sha }}
          path: bandit-report.json
          retention-days: 30

  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Build backend image
        run: |
          docker build -t mahoun-backend:scan .
      
      - name: 🔍 Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mahoun-backend:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: 📤 Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 📦 Install dependencies
        run: |
          pip install pip-licenses
          pip install -r requirements.txt
      
      - name: 📋 Generate license report
        run: |
          echo "Generating license compliance report..."
          pip-licenses --format=markdown --output-file=licenses.md
          cat licenses.md
          echo ""
          echo "Checking for GPL/AGPL licenses (incompatible with proprietary use)..."
          if grep -iE "GPL|AGPL" licenses.md; then
            echo "❌ ERROR: GPL/AGPL licenses detected - incompatible with proprietary legal AI platform"
            exit 1
          fi
          echo "✅ No incompatible licenses found"
      
      - name: 📤 Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ github.sha }}
          path: licenses.md
          retention-days: 90

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, code-scan, docker-scan, license-check]
    if: always()
    
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Scan | ${{ needs.code-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Scan | ${{ needs.docker-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed at: $(date)" >> $GITHUB_STEP_SUMMARY
