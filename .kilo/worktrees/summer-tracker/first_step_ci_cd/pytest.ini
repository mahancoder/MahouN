[pytest]
# pytest configuration for First Step CI/CD

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers
markers =
    asyncio: mark test as async
    slow: mark test as slow (skipped in quick runs)
    integration: mark test as integration test (skipped in unit runs)

# Asyncio mode
asyncio_mode = auto

# Minimum Python version
minversion = 3.8

# Test paths
testpaths = .

# Ignore paths
norecursedirs = .git __pycache__ *.egg-info

# Logging
log_cli = false
log_cli_level = WARNING

