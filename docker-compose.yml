# ============================================================================
# MAHOUN Platform - Production-Grade Docker Compose
# ============================================================================
# Profiles:
#   - default: Backend + Frontend (minimal, laptop-safe)
#   - full:    All services including Neo4j, Postgres, Redis, ChromaDB
# ============================================================================

services:
  # ==========================================================================
  # Backend - FastAPI Application (Always Active)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: mahoun/backend:latest
    container_name: mahoun-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Application
      - MAHOUN_ENV=${MAHOUN_ENV:-dev}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}

      # Phase 6: Async Job Management
      - UNIFIED_LOADER_WORKERS=${UNIFIED_LOADER_WORKERS:-2}
      - JOB_POLLING_INTERVAL=${JOB_POLLING_INTERVAL:-2}
      - DLQ_MAX_RETRIES=${DLQ_MAX_RETRIES:-3}
      - MEMORY_SAFEGUARD_GB=${MEMORY_SAFEGUARD_GB:-1.5}

      # Database connections (only used if services are available)
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${DB_NEO4J_PASSWORD:?DB_NEO4J_PASSWORD_required}
      - DB_NEO4J_PASSWORD=${DB_NEO4J_PASSWORD:?DB_NEO4J_PASSWORD_required}
      - DB_NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - DB_NEO4J_USER=${NEO4J_USER:-neo4j}

      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-mahoun}
      - POSTGRES_USER=${POSTGRES_USER:-mahoun}
      - POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD_required}
      - DB_POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD_required}
      - DB_POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - DB_POSTGRES_PORT=5432
      - DB_POSTGRES_DB=${POSTGRES_DB:-mahoun}
      - DB_POSTGRES_USER=${POSTGRES_USER:-mahoun}

      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-} # Optional but recommended. Generate with: openssl rand -base64 32
      - DB_REDIS_HOST=redis
      - DB_REDIS_PORT=6379
      - DB_REDIS_DB=0

      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - CHROMA_TOKEN=${CHROMA_TOKEN:-}

      # Security
      - JWT_SECRET_KEY=${SECURITY_JWT_SECRET:?SECURITY_JWT_SECRET_required}
      - SECURITY_JWT_SECRET=${SECURITY_JWT_SECRET:?SECURITY_JWT_SECRET_required}
      - API_KEY=${API_KEY:-}

      # Feature flags
      # Feature flags
      - ENABLE_NEO4J=${ENABLE_NEO4J:-false}
      - ENABLE_POSTGRES=${ENABLE_POSTGRES:-false}
      - ENABLE_REDIS=${ENABLE_REDIS:-false}

      # Phase 7 Strict Mode Hardening
      - MAHOUN_GUARD_MODE=STRICT
      - DETERMINISTIC_ID_ONLY=true
      - MAHOUN_ALLOW_EXPERIMENTAL=false
      - STOCHASTIC_THRESHOLD=0.0

      # Phase 7 Strict Mode Hardening
      - MAHOUN_GUARD_MODE=STRICT
      - DETERMINISTIC_ID_ONLY=true
      - MAHOUN_ALLOW_EXPERIMENTAL=false
      - STOCHASTIC_THRESHOLD=0.0

    volumes:
      # Persistent data
      - ./data:/app/data
      - ./data/dlq:/app/data/dlq  # Phase 6: Dead Letter Queue
      - ./uploads:/app/uploads
      - ./vector_store_data:/app/vector_store_data
      - ./output:/app/output
      - ./runtime:/app/runtime

      # Read-only mounts
      - ./proof_pack:/app/proof_pack:ro

    networks:
      - mahoun_secure_tier
      - mahoun_access_tier

    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "python3 /app/infrastructure/health/integrity_probe.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    # Resource limits (laptop-safe defaults)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==========================================================================
  # Frontend - React + Vite + Nginx (Always Active)
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: mahoun/frontend:latest
    container_name: mahoun-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - mahoun_access_tier

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ==========================================================================
  # Neo4j - Graph Database (Full Profile)
  # ==========================================================================
  neo4j:
    image: neo4j:5-community
    container_name: mahoun-neo4j
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${NEO4J_HTTP_PORT:-27474}:7474" # HTTP Browser (Changed to 27474 to avoid conflict)
      - "${NEO4J_BOLT_PORT:-27687}:7687" # Bolt Protocol (Changed to 27687 to avoid conflict)

    environment:
      - NEO4J_AUTH=${DB_NEO4J_USER:-neo4j}/${DB_NEO4J_PASSWORD:?DB_NEO4J_PASSWORD_required}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_SIZE:-512M}
      - NEO4J_dbms_memory_pagecache_size=${NEO4J_PAGECACHE_SIZE:-256M}
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_dbms_default__listen__address=0.0.0.0
      - NEO4J_dbms_connector_bolt_listen__address=:7687
      - NEO4J_dbms_connector_http_listen__address=:7474

    volumes:
      - ./data/neo4j_data:/data
      - ./data/neo4j_logs:/logs
      - ./data/neo4j_import:/var/lib/neo4j/import

    networks:
      - mahoun_secure_tier

    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1" ]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 2G

  # ==========================================================================
  # Redis - Cache & Session Store (Full Profile)
  # ==========================================================================
  redis:
    image: redis:7.4.2-alpine
    container_name: mahoun-redis
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${REDIS_PORT:-6380}:6379"

    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --appendfsync everysec --maxmemory $${REDIS_MAX_MEMORY:-1gb} --maxmemory-policy allkeys-lru --requirepass \"$${REDIS_PASSWORD}\" --save 900 1 --save 300 10 --save 60 10000
      else
        redis-server --appendonly yes --appendfsync everysec --maxmemory $${REDIS_MAX_MEMORY:-1gb} --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000
      fi
      "

    volumes:
      - redis_data:/data

    networks:
      - mahoun_secure_tier

    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M

  # ==========================================================================
  # PostgreSQL - Relational Database (Full Profile)
  # ==========================================================================
  postgres:
    image: postgres:16.6-alpine
    container_name: mahoun-postgres
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mahoun}
      - POSTGRES_USER=${POSTGRES_USER:-mahoun}
      - POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD:?DB_POSTGRES_PASSWORD_required}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata

    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./mahoun/graph/schema/sql/master_schema.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

    networks:
      - mahoun_secure_tier

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mahoun} -d ${POSTGRES_DB:-mahoun}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ==========================================================================
  # ChromaDB - Vector Database (Full Profile)
  # ==========================================================================
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: mahoun-chromadb
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${CHROMADB_PORT:-8001}:8000"

    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=${CHROMA_TELEMETRY:-FALSE}
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=${CHROMA_AUTH_PROVIDER:-}
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_TOKEN:-}

    volumes:
      - chromadb_data:/chroma/chroma

    networks:
      - mahoun_secure_tier
      - mahoun_access_tier

    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ==========================================================================
  # Prometheus - Metrics Collection (Full Profile, Optional)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: mahoun-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    networks:
      - mahoun_secure_tier

    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 5s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M

  # ==========================================================================
  # Grafana - Monitoring Dashboard (Full Profile, Optional)
  # ==========================================================================
  grafana:
    image: grafana/grafana:11.5.0
    container_name: mahoun-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-dev_grafana_change_me}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}

    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro

    depends_on:
      - prometheus

    networks:
      - mahoun_secure_tier

    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

# ============================================================================
# Named Volumes (Persistent Data)
# ============================================================================
volumes:
  neo4j_data:
    driver: local
    name: mahoun_neo4j_data
  neo4j_logs:
    driver: local
    name: mahoun_neo4j_logs
  neo4j_import:
    driver: local
    name: mahoun_neo4j_import

  postgres_data:
    driver: local
    name: mahoun_postgres_data

  redis_data:
    driver: local
    name: mahoun_redis_data

  chromadb_data:
    driver: local
    name: mahoun_chromadb_data

  prometheus_data:
    driver: local
    name: mahoun_prometheus_data

  grafana_data:
    driver: local
    name: mahoun_grafana_data

# ============================================================================
# Networks (Internal Communication)
# ============================================================================
networks:
  mahoun_secure_tier:
    driver: bridge
    internal: true
    name: mahoun_secure_tier
  mahoun_access_tier:
    driver: bridge
    name: mahoun_access_tier
